name: CodeQL

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: "20 6 * * 1"

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: javascript-typescript
            build-mode: none
          - language: rust
            build-mode: none
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false
      - uses: github/codeql-action/init@dd903d2e4f5405488e5ef1422510ee31c8b32357
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
      - if: matrix.build-mode == 'autobuild'
        uses: github/codeql-action/autobuild@dd903d2e4f5405488e5ef1422510ee31c8b32357
      - uses: github/codeql-action/analyze@dd903d2e4f5405488e5ef1422510ee31c8b32357
