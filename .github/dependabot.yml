version: 2
updates:
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Etc/UTC
    groups:
      security-critical:
        patterns:
          - argon2
          - chacha20poly1305
          - rand
          - tauri*
          - zeroize
        update-types:
          - patch
          - minor
          - major
      rust-patch-and-minor:
        patterns:
          - "*"
        update-types:
          - patch
          - minor
      rust-major:
        patterns:
          - "*"
        update-types:
          - major
    labels:
      - dependabot
      - needs-human-review
    commit-message:
      prefix: chore
      include: scope

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:15"
      timezone: Etc/UTC
    labels:
      - dependabot
      - needs-human-review
    groups:
      frontend-tooling-patch-and-minor:
        patterns:
          - "@sveltejs/*"
          - "@types/node"
          - svelte
          - svelte-check
          - typescript
          - vite
          - vitest
        update-types:
          - patch
          - minor
      frontend-tooling-major:
        patterns:
          - "@sveltejs/*"
          - "@types/node"
          - svelte
          - svelte-check
          - typescript
          - vite
          - vitest
        update-types:
          - major
    commit-message:
      prefix: chore
      include: scope

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:45"
      timezone: Etc/UTC
    labels:
      - dependabot
      - needs-human-review
    groups:
      github-actions:
        patterns:
          - "*"
    commit-message:
      prefix: chore
      include: scope
