[package]
name = "vault-core"
version = "0.1.0"
edition = "2021"

[dependencies]
argon2 = "0.5"
chacha20poly1305 = "0.10"
rand = "0.8"
uuid = { version = "1", features = ["v4"] }
zeroize = { version = "1", features = ["derive"] }
chrono = { version = "0.4", features = ["serde"] }
serde = { version = "1", features = ["derive"] }
thiserror = "1"
keepass = "0.6"

[dev-dependencies]
tempfile = "3"
