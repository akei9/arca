[package]
name = "vault-core"
version = "0.1.0"
edition = "2021"
license = "MIT"

[dependencies]
argon2 = "0.5"
chacha20poly1305 = "0.10"
rand = "0.10"
uuid = { version = "1", features = ["v4"] }
zeroize = { version = "1", features = ["derive"] }
chrono = { version = "0.4", features = ["serde"] }
serde = { version = "1", features = ["derive"] }
thiserror = "2"
keepass = { version = "0.6", features = ["save_kdbx4"] }

[dev-dependencies]
tempfile = "3"
